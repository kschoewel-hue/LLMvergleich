<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    padding: 20px;
    min-height: 100vh;
  }
  h1 {
    text-align: center;
    font-size: 1.5rem;
    margin-bottom: 6px;
    color: #fff;
    letter-spacing: 0.5px;
  }
  .subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 18px;
  }
  #chart-container {
    max-width: 900px;
    margin: 0 auto;
  }
  #date-display {
    text-align: center;
    font-size: 2.8rem;
    font-weight: 700;
    color: #4a9eff;
    margin-bottom: 12px;
    font-variant-numeric: tabular-nums;
  }
  .bar-row {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
    height: 42px;
    transition: all 0.05s ease;
  }
  .bar-label {
    width: 140px;
    text-align: right;
    padding-right: 10px;
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
    color: #ddd;
  }
  .bar-wrapper {
    flex: 1;
    background: #1a1d27;
    border-radius: 4px;
    overflow: hidden;
    height: 36px;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.12s ease-out;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 10px;
    min-width: 40px;
  }
  .bar-value {
    font-size: 0.78rem;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }
  .controls {
    max-width: 900px;
    margin: 20px auto 0;
    padding: 16px 20px;
    background: #1a1d27;
    border-radius: 10px;
    border: 1px solid #2a2d3a;
  }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .slider-row label {
    font-size: 0.82rem;
    color: #aaa;
    white-space: nowrap;
  }
  #timeline-slider {
    flex: 1;
    -webkit-appearance: none;
    height: 6px;
    border-radius: 3px;
    background: #2a2d3a;
    outline: none;
    cursor: pointer;
  }
  #timeline-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #4a9eff;
    cursor: pointer;
    box-shadow: 0 0 6px rgba(74,158,255,0.6);
  }
  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  button {
    padding: 8px 18px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    transition: background 0.2s;
  }
  #btn-play { background: #4a9eff; color: #fff; }
  #btn-play:hover { background: #2e86f5; }
  #btn-reset { background: #333; color: #ccc; }
  #btn-reset:hover { background: #444; }
  .speed-label { font-size: 0.82rem; color: #aaa; }
  #speed-select {
    background: #2a2d3a;
    color: #ccc;
    border: 1px solid #3a3d4a;
    border-radius: 5px;
    padding: 5px 8px;
    font-size: 0.82rem;
    cursor: pointer;
  }
  .legend {
    max-width: 900px;
    margin: 16px auto 0;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 0 4px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    color: #bbb;
  }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }

    font-size: 0.7rem;
    color: #555;

// Zeitschritte: Monat 0 = Jan 2023, Monat 38 = Mär 2026
const TOTAL_MONTHS = 39;
const START_YEAR = 2023;
const START_MONTH = 0; // Januar

function monthIndexToLabel(idx) {
  const months = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
  const totalMonths = idx;
  const year = START_YEAR + Math.floor((START_MONTH + totalMonths) / 12);
  const month = (START_MONTH + totalMonths) % 12;
  return months[month] + " " + year;
}

// Interpolation: Wert für Modell zum Zeitpunkt idx
function getValueAt(modelKey, idx) {
  const d = models[modelKey].data;
  const keys = Object.keys(d).map(Number).sort((a,b)=>a-b);
  if (!keys.length) return 0;
  if (idx < keys[0]) return 0;
  let lastVal = 0;
  for (let k of keys) {
    if (k <= idx) lastVal = d[k];
    else break;
  }
  return lastVal;
}

function formatTokens(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1).replace('.0','') + "M";
  if (n >= 1000) return (n/1000).toFixed(0) + "K";
  return n.toString();
}

// Top-N-Modelle für einen Zeitpunkt (nur Modelle mit Wert > 0)
const TOP_N = 10;

function getTopModels(idx) {
  const entries = Object.keys(models).map(k => ({
    key: k,
    value: getValueAt(k, idx),
    color: models[k].color
  })).filter(e => e.value > 0);
  entries.sort((a,b) => b.value - a.value);
  return entries.slice(0, TOP_N);
}

// DOM aufbauen
const barsDiv = document.getElementById('bars');
const slider = document.getElementById('timeline-slider');
const dateDisplay = document.getElementById('date-display');
const sliderLabel = document.getElementById('slider-label');

slider.max = TOTAL_MONTHS - 1;
slider.value = 0;

let currentIdx = 0;
let playing = false;
let intervalId = null;

function render(idx) {
  currentIdx = idx;
  slider.value = idx;
  const label = monthIndexToLabel(idx);
  dateDisplay.textContent = label;
  sliderLabel.textContent = label;

  const top = getTopModels(idx);
  const maxVal = top.length > 0 ? top[0].value : 1;

  barsDiv.innerHTML = '';
  top.forEach((entry, rank) => {
    const pct = Math.max(3, (entry.value / maxVal) * 100);
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `
      <div class="bar-label">${entry.key}</div>
      <div class="bar-wrapper">
        <div class="bar-fill" style="width:${pct}%;background:${entry.color}">
          <span class="bar-value">${formatTokens(entry.value)}</span>
        </div>
      </div>
    `;
    barsDiv.appendChild(row);
  });
}

function getSpeed() {
  return parseInt(document.getElementById('speed-select').value);
}

function startPlay() {
  if (currentIdx >= TOTAL_MONTHS - 1) currentIdx = 0;
  playing = true;
  document.getElementById('btn-play').textContent = '⏸ Pause';
  intervalId = setInterval(() => {
    if (currentIdx >= TOTAL_MONTHS - 1) {
      stopPlay();
      return;
    }
    currentIdx++;
    render(currentIdx);
  }, getSpeed());
}

function stopPlay() {
  playing = false;
  clearInterval(intervalId);
  document.getElementById('btn-play').textContent = '▶ Play';
}

document.getElementById('btn-play').addEventListener('click', () => {
  if (playing) stopPlay();
  else startPlay();
});

document.getElementById('btn-reset').addEventListener('click', () => {
  stopPlay();
  render(0);
});

slider.addEventListener('input', () => {
  stopPlay();
  render(parseInt(slider.value));
});

document.getElementById('speed-select').addEventListener('change', () => {
  if (playing) {
    stopPlay();
    startPlay();
  }
});

// Legende
const legendDiv = document.getElementById('legend');
Object.entries(models).forEach(([key, m]) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<div class="legend-dot" style="background:${m.color}"></div><span>${key}</span>`;
  legendDiv.appendChild(item);
});

render(0);
